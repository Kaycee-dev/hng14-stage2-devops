name: ci-cd

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY_HOST: localhost
  REGISTRY_PORT: "5000"
  IMAGE_NAMESPACE: hng14-stage2-devops

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8==7.0.0

      - name: flake8 (Python)
        run: flake8 api worker

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dev deps
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: eslint (JavaScript)
        working-directory: frontend
        run: npx eslint .

      - name: hadolint (Dockerfiles)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          config: .hadolint.yaml
          failure-threshold: warning

  test:
    name: test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install api dev deps
        working-directory: api
        run: pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        working-directory: api
        env:
          JOB_QUEUE_NAME: jobs
        run: |
          pytest \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term \
            --junitxml=pytest-report.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: |
            api/coverage.xml
            api/htmlcov/
            api/pytest-report.xml
          retention-days: 7

  build:
    name: build
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Wait for local registry
        run: |
          for i in $(seq 1 30); do
            if curl --fail --silent http://localhost:5000/v2/; then
              echo "registry ready"; exit 0
            fi
            sleep 2
          done
          echo "registry never became ready" >&2
          exit 1

      - name: Build and push api image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY_HOST }}:${{ env.REGISTRY_PORT }}/${{ env.IMAGE_NAMESPACE }}/api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY_HOST }}:${{ env.REGISTRY_PORT }}/${{ env.IMAGE_NAMESPACE }}/api:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY_HOST }}:${{ env.REGISTRY_PORT }}/${{ env.IMAGE_NAMESPACE }}/worker:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY_HOST }}:${{ env.REGISTRY_PORT }}/${{ env.IMAGE_NAMESPACE }}/worker:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY_HOST }}:${{ env.REGISTRY_PORT }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY_HOST }}:${{ env.REGISTRY_PORT }}/${{ env.IMAGE_NAMESPACE }}/frontend:latest

      - name: Verify registry manifest listing
        run: |
          for svc in api worker frontend; do
            echo "=== ${svc} ==="
            curl --fail --silent http://localhost:5000/v2/${{ env.IMAGE_NAMESPACE }}/${svc}/tags/list
            echo ""
          done

      - name: Pull images locally and save tarballs for downstream jobs
        run: |
          mkdir -p image-bundle
          for svc in api worker frontend; do
            docker pull ${{ env.REGISTRY_HOST }}:${{ env.REGISTRY_PORT }}/${{ env.IMAGE_NAMESPACE }}/${svc}:${{ env.IMAGE_TAG }}
            docker tag \
              ${{ env.REGISTRY_HOST }}:${{ env.REGISTRY_PORT }}/${{ env.IMAGE_NAMESPACE }}/${svc}:${{ env.IMAGE_TAG }} \
              ${{ env.REGISTRY_HOST }}:${{ env.REGISTRY_PORT }}/${{ env.IMAGE_NAMESPACE }}/${svc}:latest
            docker save \
              ${{ env.REGISTRY_HOST }}:${{ env.REGISTRY_PORT }}/${{ env.IMAGE_NAMESPACE }}/${svc}:${{ env.IMAGE_TAG }} \
              ${{ env.REGISTRY_HOST }}:${{ env.REGISTRY_PORT }}/${{ env.IMAGE_NAMESPACE }}/${svc}:latest \
              -o image-bundle/${svc}.tar
          done
          ls -la image-bundle

      - name: Upload image bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-bundle
          path: image-bundle/
          retention-days: 1

  security-scan:
    name: security-scan
    needs: build
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Download image bundle
        uses: actions/download-artifact@v4
        with:
          name: image-bundle
          path: image-bundle

      - name: Load images
        run: |
          for tar in image-bundle/*.tar; do
            docker load -i "${tar}"
          done
          docker image ls

      - name: Trivy scan - api
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.REGISTRY_HOST }}:${{ env.REGISTRY_PORT }}/${{ env.IMAGE_NAMESPACE }}/api:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy scan - worker
        if: always()
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.REGISTRY_HOST }}:${{ env.REGISTRY_PORT }}/${{ env.IMAGE_NAMESPACE }}/worker:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy scan - frontend
        if: always()
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.REGISTRY_HOST }}:${{ env.REGISTRY_PORT }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: |
            trivy-api.sarif
            trivy-worker.sarif
            trivy-frontend.sarif
          retention-days: 7

  integration-test:
    name: integration-test
    needs: security-scan
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Download image bundle
        uses: actions/download-artifact@v4
        with:
          name: image-bundle
          path: image-bundle

      - name: Load images
        run: |
          for tar in image-bundle/*.tar; do
            docker load -i "${tar}"
          done
          docker image ls

      - name: Materialize .env for compose
        run: |
          cp .env.example .env
          {
            echo "IMAGE_TAG=${IMAGE_TAG}"
            echo "REDIS_PASSWORD=ci-only-$(openssl rand -hex 16)"
          } >> .env

      - name: Run integration test
        run: bash tests/integration/run_integration.sh

  deploy:
    name: deploy
    needs: integration-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      IMAGE_TAG: ${{ github.sha }}
      DEPLOY_HEALTH_TIMEOUT_SECONDS: "60"
      DEPLOY_NETWORK_NAME: stage2-internal
    steps:
      - uses: actions/checkout@v4

      - name: Download image bundle
        uses: actions/download-artifact@v4
        with:
          name: image-bundle
          path: image-bundle

      - name: Load images
        run: |
          for tar in image-bundle/*.tar; do
            docker load -i "${tar}"
          done

      - name: Materialize .env for deploy
        run: |
          cp .env.example .env
          {
            echo "IMAGE_TAG=${IMAGE_TAG}"
            echo "REDIS_PASSWORD=deploy-only-$(openssl rand -hex 16)"
          } >> .env

      - name: Establish initial running stack (simulates existing deployment)
        run: |
          docker compose up -d --wait --wait-timeout 90
          docker compose ps

      - name: Detach app containers from compose supervision
        run: |
          for svc in api worker frontend; do
            cid=$(docker compose ps -q "${svc}")
            [ -n "${cid}" ] || continue
            docker rename "${cid}" "${svc}"
          done
          docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'

      - name: Run scripted rolling update
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: bash scripts/rolling_deploy.sh

      - name: Verify final health
        run: |
          docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
          for svc in api worker frontend; do
            status=$(docker inspect --format '{{.State.Health.Status}}' "${svc}")
            echo "${svc}: ${status}"
            [ "${status}" = "healthy" ] || exit 1
          done

      - name: Tear down
        if: always()
        run: |
          for c in api worker frontend; do docker rm -f "${c}" || true; done
          docker compose down --volumes --remove-orphans || true
