name: ${COMPOSE_PROJECT_NAME:-hng14-stage2-devops}

networks:
  stage2-internal:
    name: ${DEPLOY_NETWORK_NAME:-stage2-internal}
    driver: bridge

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis:
    image: redis:7.2-alpine
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --save
      - ""
      - --appendonly
      - "no"
    restart: unless-stopped
    networks:
      - stage2-internal
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "128M"
    logging: *default-logging

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: ${REGISTRY_HOST:-localhost}:${REGISTRY_PORT:-5000}/${IMAGE_NAMESPACE:-hng14-stage2-devops}/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME}
    networks:
      - stage2-internal
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 4
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "256M"
    logging: *default-logging

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    image: ${REGISTRY_HOST:-localhost}:${REGISTRY_PORT:-5000}/${IMAGE_NAMESPACE:-hng14-stage2-devops}/worker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME}
      WORKER_POLL_TIMEOUT_SECONDS: ${WORKER_POLL_TIMEOUT_SECONDS}
      WORKER_SIMULATED_DELAY_SECONDS: ${WORKER_SIMULATED_DELAY_SECONDS}
    networks:
      - stage2-internal
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "256M"
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${REGISTRY_HOST:-localhost}:${REGISTRY_PORT:-5000}/${IMAGE_NAMESPACE:-hng14-stage2-devops}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      FRONTEND_HOST: ${FRONTEND_HOST}
      FRONTEND_PORT: ${FRONTEND_PORT}
      FRONTEND_API_BASE_URL: ${FRONTEND_API_BASE_URL}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    networks:
      - stage2-internal
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "/app/healthcheck.js"]
      interval: 15s
      timeout: 3s
      retries: 4
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "256M"
    logging: *default-logging
